name: CI

on:
  push:
    branches: [master, main, "mc/**"]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev deps
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  replayt-floor:
    name: replayt minimum (0.4.25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install with minimum supported replayt
        run: |
          pip install -e ".[dev]"
          pip install --force-reinstall "replayt==0.4.25"
      - name: Run tests
        run: pytest -q
